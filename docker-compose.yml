services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      
  postgres:
    image: postgres:18
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    env_file:
      -  .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d subsdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    
volumes:
  postgres_data: